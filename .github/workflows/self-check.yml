name: self-check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install cryptography python-telegram-bot
      - name: Prepare runtime dirs
        run: |
          mkdir -p tmp
      - name: Run self-check (without integration creds)
        run: |
          chmod +x scripts/self_check.sh
          ./scripts/self_check.sh
