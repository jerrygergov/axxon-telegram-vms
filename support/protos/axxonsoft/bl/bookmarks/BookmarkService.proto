syntax = "proto3";
package axxonsoft.bl.bookmarks;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "axxonsoft/bl/bookmarks/Bookmark.proto";
import "axxonsoft/bl/primitive/Primitives.proto";

option go_package = "bitbucket.org/Axxonsoft/bl/bookmarks";

message CreateBookmarkRequest
{
    Bookmark bookmark = 1;
}

message CreateBookmarkResponse
{
    // Saved bookmark.
    Bookmark bookmark = 1;
}

message UpdateBookmarkRequest
{
    Bookmark bookmark = 1;
}

message UpdateBookmarkResponse
{
    // Updated bookmark.
    Bookmark bookmark = 1;
}

message DeleteBookmarkRequest
{
    // Id of the bookmark to remove.
    string id = 1;
}

message DeleteBookmarkResponse
{
}

message DisplayMode
{
    // To retrieve area of CameraDescription converted into track.
    bool track = 1;
}

message Filter
{
    repeated string camera_access_points = 1;

    // Сomment or its part.
    string message = 2;
}

message ListBookmarksRequest
{
    // Indicates volume of data required to retrieve.
    DisplayMode mode = 1;

    // Archive range covered by the bookmark.
    primitive.TimeRangeTS range = 2;

    // The maximum number of bookmarks to return. The service may return fewer than this value.
    // If unspecified, at most 50 bookmarks will be returned.
    // The maximum value is 100; values above 100 will be coerced to 100.
    int32 page_size = 3;

    // A page token, received from a previous `ListBookmarks` call.
    // Provide this to retrieve the subsequent page.
    string page_token = 4;

    Filter filter = 5;
}

message ListBookmarksResponse
{
    repeated Bookmark bookmarks = 1;

    // A token that can be sent as `page_token` to retrieve the next page.
    // If this field is omitted, there are no subsequent pages.
    string next_page_token = 2;
}

message GetBookmarkRequest
{
    // Id of the bookmark to retrieve.
    string id = 1;

    // Indicates volume of data required to retrieve.
    DisplayMode mode = 2;
}

message GetBookmarkResponse
{
    Bookmark bookmark = 1;
}

message SetExportedTimeRequest
{
    // Id of the bookmark.
    string id = 1;
    google.protobuf.Timestamp exported_time = 12;
}

message SetExportedTimeResponse
{
}

service BookmarkService
{
    rpc ListBookmarks(ListBookmarksRequest) returns (ListBookmarksResponse) {
        option (google.api.http) = {
            post: "/v1/bookmarks:list"
            body: "*"
        };
    };

    rpc GetBookmark(GetBookmarkRequest) returns (GetBookmarkResponse) {
        option (google.api.http) = {
            post: "/v1/bookmarks:get"
            body: "*"
        };
    };

    rpc CreateBookmark(CreateBookmarkRequest) returns (CreateBookmarkResponse) {
        option (google.api.http) = {
            post: "/v1/bookmarks:create"
            body: "*"
        };
    };

    rpc UpdateBookmark(UpdateBookmarkRequest) returns (UpdateBookmarkResponse) {
        option (google.api.http) = {
            post: "/v1/bookmarks:update"
            body: "*"
        };
    };

    rpc DeleteBookmark(DeleteBookmarkRequest) returns (DeleteBookmarkResponse) {
        option (google.api.http) = {
            post: "/v1/bookmarks:delete"
            body: "*"
        };
    };

    rpc SetExportedTime(SetExportedTimeRequest) returns (SetExportedTimeResponse) {
        option (google.api.http) = {
            post: "/v1/bookmarks:setExportedTime"
            body: "*"
        };
    };

}
