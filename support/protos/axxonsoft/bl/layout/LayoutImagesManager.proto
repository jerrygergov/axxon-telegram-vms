syntax = "proto3";
package axxonsoft.bl.layout;

option go_package = "bitbucket.org/Axxonsoft/bl/layout";

message ImageMeta
{
    // Image ID.
    string id = 1;
    
    // Image revision.
    string etag = 2;
}

message ListLayoutImagesRequest
{
    // Layout ID.
    string layout_id = 1;
}

message ListLayoutImagesResponse
{
    repeated ImageMeta images = 1;
}

message RemoveLayoutImagesRequest
{
    // Layout ID.
    string layout_id = 1;

    // Images' IDs to remove.
    repeated string images_ids = 2;
}

message RemoveLayoutImagesResponse
{
}

message UploadLayoutImageRequest
{
    // Layout ID.
    // NOTE: Accepted only on the initial request, subsequent values are ignored.
    string layout_id = 1;

    // Image ID.
    // Has to be generated by client (using GUID is recommended).
    // NOTE: Accepted only on the initial request, subsequent values are ignored.
    string image_id = 2;

    // Last seen image revision (OR empty if the image is being uploaded the first time)
    // NOTE: Accepted only on the initial request, subsequent values are ignored.
    string etag = 3;

    // Image size (in bytes).
    // NOTE: Accepted only on the initial request, subsequent values are ignored.
    uint64 total_size_bytes = 4;

    bytes chunk_data = 5;
}

message UploadLayoutImageResponse
{
    enum Status
    {
        STATUS_UNSPECIFIED = 0;
        OK = 1;
        FAILED = 2;
    }
    Status status = 1;
    string message = 2;

    // Updated image revision.
    string etag = 3;
}

message DownloadLayoutImageRequest
{
    // Layout ID.
    string layout_id = 1;

    // Image ID.
    string image_id = 2;

    // Requested chunk size.
    // Recommended chunk size appears to be 16-64 KiB.
    // Note that by default gRPC limits incoming messages to 4 MiB.
    uint64 chunk_size_kb = 3;
}

message DownloadLayoutImageResponse
{
    // Image revision.
    // NOTE: Filled in only for the first response, values for subsequent responses are not guaranteed.
    string etag = 1;

    // Image size (in bytes).
    // NOTE: Filled in only for the first response, values for subsequent responses are not guaranteed.
    uint64 total_size_bytes = 2;

    uint64 chunk_index = 3;
    bytes chunk_data = 4;
}

service LayoutImagesManager
{
    rpc ListLayoutImages(ListLayoutImagesRequest) returns (ListLayoutImagesResponse);
    rpc RemoveLayoutImages(RemoveLayoutImagesRequest) returns (RemoveLayoutImagesResponse);
    rpc UploadLayoutImage(stream UploadLayoutImageRequest) returns (UploadLayoutImageResponse);
    rpc DownloadLayoutImage(DownloadLayoutImageRequest) returns (stream DownloadLayoutImageResponse);
}
