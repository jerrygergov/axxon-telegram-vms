enum EAcfaComponentType
{
    option deprecated = true; // Use the AcfaObjectType instead

    ACFAUndefined = 0;

    ACFA = 1; // required root unit type
    ACFAController = 2;
    ACFALoop = 3;
    ACFAReader = 4;
    ACFASensor = 5;
    ACFARelay = 6;
    ACFALock = 7;
    ACFAArea = 8;
    ACFAGroupArea = 9;
    ACFAFence = 10;
}

message AcfaObjectType
{
    string name = 1;
    string display_name = 2;
}

message InternalType
{
    string name = 1;
    string display_name = 2;
}

message AcfaComponent
{
    string access_point = 1;
    string parent_access_point = 2;
    string display_name = 3;
    string display_id = 4;
    AcfaObjectType object_type = 10;
    InternalType internal_type = 8;
    bool is_activated = 6;
    bool enabled = 7;
    repeated string group_ids = 11;
    google.protobuf.BoolValue has_children = 12;

    // Effective access.
    security.EAcfaAccess access = 9;

    EAcfaComponentType type = 5 [deprecated = true]; // Use the object_type field instead
}

message AcfaComponentSearchQuery
{
    string object_type = 3; // Unit type identifier. If empty search any
    string internal_type = 2; // Unit internal type identifier. If empty search any


    EAcfaComponentType component_type = 1 [deprecated = true]; // Use the object_type field instead
}

message ListAcfaComponentsRequest
{
    enum EDisplayMode
    {
        VM_DEFAULT = 0; // default view mode of components without relations
        VM_WITH_RELATIONS = 1; // view mode of components with relations to complete the tree up to the root node
    }

    // 'query', 'custom_query', 'parent_access_point' and 'group_ids' are combined with each other by the logical 'AND' rule
    SearchQuery query = 6;
    AcfaComponentSearchQuery custom_query = 7;

    // Filter the resulting components by parent access point. If not specified search any.
    // Specify empty string value to get root nodes.
    google.protobuf.StringValue parent_access_point = 8;

    // Only filter for components in these groups.
    // If empty search will be done for all groups
    repeated string group_ids = 9;

    string page_token = 1;
    int32 page_size = 2;
    EDisplayMode mode = 3;
}

message ListAcfaComponentsResponse
{
    repeated AcfaComponent items = 1;
    string next_page_token = 2;
    repeated SearchMetaData search_meta_data = 3;

    // ACFA equipment is a tree structure with an unknown number of levels, presented here as a list.
    // In this regard, the 'relations' field will contain the missing element nodes
    // to complete the full tree up to the root node, if they are not in the 'items'.
    // Note: This field will only be used with "VM_WITH_RELATIONS" mode in the request.
    //       Elements from "relations" count towards page size.
    //       But if the size is exceeded, it will complete the full tree up to the root node.
    repeated AcfaComponent relations = 4;
}

message BatchGetAcfaComponentsRequest
{
    enum EDisplayMode
    {
        VM_DEFAULT = 0; // default view mode of components without relations
        VM_WITH_RELATIONS = 1; // view mode of components with relations to complete the tree up to the root node
    }

    // NOTE: Default view (if it's unspecified for an item) depends on the request's mode:  VM_DEFAULT -> BASIC, VM_WITH_RELATIONS -> FULL.
    repeated ResourceLocator items = 1;
    EDisplayMode mode = 2;
}

message BatchGetAcfaComponentsResponse
{
    repeated AcfaComponent items = 1;
    repeated AcfaComponent relations = 2;
    repeated string not_found_objects = 3;
    repeated string unreachable_objects = 4;
}

message SearchMapsRequest
{
    repeated ResourceLocator items = 1;
}

message MapLocator
{
    string access_point = 1;
    repeated string map_ids = 2;
}

message SearchMapsResponse
{
    repeated MapLocator maps = 1;
    repeated string not_found_objects = 2;
    repeated string unreachable_objects = 3;
}

// Domain is a collection of ngp nodes with shared resources and config.
// Each ngp node can be member of single domain.
service DomainService
{
    rpc GetVersion (GetVersionRequest) returns (GetVersionResponse);
    rpc GetHostPlatformInfo (GetHostPlatformInfoRequest) returns (GetHostPlatformInfoResponse);
    rpc GetHostTimeZone (GetHostTimeZoneRequest) returns (GetHostTimeZoneResponse);

    // Search for cameras in domain
    rpc ListCameras (ListCamerasRequest) returns (stream ListCamerasResponse) {
        option (google.api.http) = {
            get: "/v1/domain/cameras"
        };
    };

    // Fast lookup for retrieving cameras by id
    rpc BatchGetCameras (BatchGetCamerasRequest) returns (stream BatchGetCamerasResponse) {
        option (google.api.http) = {
            post: "/v1/domain/cameras:batchGet"
            body: "*"
        };
    };

    // Fast lookup for retrieving cameras by their component
    rpc GetCamerasByComponents (GetCamerasByComponentsRequest) returns (stream GetCamerasByComponentsResponse) {
        option (google.api.http) = {
            post: "/v1/domain/cameras:getByComponents"
            body: "*"
        };
    };

    // Search for archives in domain.
    rpc ListArchives (ListArchivesRequest) returns (stream ListArchivesResponse) {
        option (google.api.http) = {
            get: "/v1/domain/archives"
        };
    };

    /// Fast lookup for retrieving archives by id
    rpc BatchGetArchives(BatchGetArchivesRequest) returns (stream BatchGetArchivesResponse) {
        option (google.api.http) = {
            post: "/v1/domain/archives:batchGet"
            body: "*"
        };
    };

    rpc ListControlPanels (ListControlPanelsRequest) returns (stream ListControlPanelsResponse);
    rpc BatchGetControlPanels (BatchGetControlPanelsRequest) returns (stream BatchGetControlPanelsResponse);

    rpc ListCommonDevices (ListCommonDevicesRequest) returns (stream ListCommonDevicesResponse);
    rpc BatchGetCommonDevices (BatchGetCommonDevicesRequest) returns (stream BatchGetCommonDevicesResponse);

    rpc ListComponents (ListComponentsRequest) returns (stream ListComponentsResponse);

    rpc ListGlobalTrackers(ListGlobalTrackersRequest) returns (stream ListGlobalTrackersResponse);

    rpc ListGlobalTrackerCameras(ListGlobalTrackerCamerasRequest) returns (stream ListGlobalTrackerCamerasResponse);

    rpc ListAcfaComponents(ListAcfaComponentsRequest) returns (stream ListAcfaComponentsResponse);

    // ListAcfaComponents2() has been introduced to indicate that server supports 'parent_access_point' and 'group_ids' 
    // fields in ListAcfaComponentsRequest, but the implementation is identical with ListAcfaComponents().
    rpc ListAcfaComponents2(ListAcfaComponentsRequest) returns (stream ListAcfaComponentsResponse);

    rpc BatchGetAcfaComponents (BatchGetAcfaComponentsRequest) returns (stream BatchGetAcfaComponentsResponse);

    rpc ListNodes(ListNodesRequest) returns (ListNodesResponse) {
          option (google.api.http) = {
            get: "/v1/domain/nodes"
        };
    }

    // Fast lookup for retrieving maps by camera id
    rpc SearchMaps (SearchMapsRequest) returns (stream SearchMapsResponse) {
        option (google.api.http) = {
            post: "/v1/domain/maps:search"
            body: "*"
        };
    };
}
