        AE_USER_REMOVE = 8;
        AE_USER_SETUP = 9;
        AE_ROLE_ADD = 10;
        AE_ROLE_REMOVE = 11;
        AE_ROLE_SETUP = 12;
        AE_USER_LOGIN = 13;
        AE_USER_LOGOUT = 14;
        AE_DEVICE_ADD = 15;
        AE_DEVICE_REMOVE = 16;
        AE_DEVICE_SETUP = 17;
        AE_DETECTOR_ADD = 18;
        AE_DETECTOR_REMOVE = 19;
        AE_DETECTOR_SETUP = 20;
        AE_ARCHIVE_ADD = 21;
        AE_ARCHIVE_REMOVE = 22;
        AE_ARCHIVE_SETUP = 23;
        AE_RULE_ADD = 24;
        AE_RULE_REMOVE = 25;
        AE_RULE_SETUP = 26;
        AE_ALERT_MODE_SETUP = 27;
        AE_ZONE_ARMED = 28;
        AE_ZONE_DISARMED = 29;
        AE_MMEXPORT = 30;
        AE_NOTIFIER_ADD = 31;
        AE_NOTIFIER_REMOVE = 32;
        AE_NOTIFIER_SETUP = 33;
        AE_GENERAL_SETUP = 34;
        AE_ARCHIVE_BINDING_SETUP = 35;
        AE_MMEXPORTAGENT_ADD = 36;
        AE_MMEXPORTAGENT_REMOVE = 37;
