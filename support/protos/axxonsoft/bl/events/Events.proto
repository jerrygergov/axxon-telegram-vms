// Represents self-diagnosis alert rule activation.
message DiagnosticAlertEvent
{
    enum EAlertType
    {
        ALERT_TYPE_UNSPECIFIED = 0;

        // General system warnings.
        AT_HANDLE_LEAK    = 1; // Process is using too much handles
        AT_LOW_MEMORY     = 2; // Low OS virtual memory
        AT_LOW_DISK_SPACE = 3; // Low disk free space
        AT_HIGH_CPU_LOAD  = 4; // CPU usage above limit

        // NGP infrastructure malfunctions.
        AT_ARCHIVE_NO_PING              = 1000; // Archive does not receiving detector events sent via LogicServer
        AT_ARCHIVE_NO_SAMPLES           = 1001; // Archive with active Ipint sources not receiving input samples
        AT_ARCHIVE_OVERLOADED           = 1002; // Archive performance is not enough to handle all the input frames
        AT_ARCHIVE_SOURCE_NOT_ACTIVATED = 1003; // Archive source seems to be inactive
        AT_DETECTOR_NO_SAMPLES          = 1100; // Detector with healthy Decoder source not receiving input samples
        AT_IPINT_NO_SAMPLES             = 1200; // Ipint source not receiving new multimedia samples
        AT_IPINT_NOT_ACTIVATED          = 1201; // Ipint service was started but not reported its activation
        AT_STAT_SERVER_UNHEALTHY        = 1300; // Statistics server that collects internal metrics seems unhealthy
    }
    // Rule config info.
    bool rule_enabled = 3; // Enabled rules are allowed to perform actions
    string rule_name = 4;
    string rule_comment = 5;

    // Alert template info.
    EAlertType alert_type = 7;
    string alert_description = 6;

    // Problem info.
    google.protobuf.Timestamp timestamp = 10;
    google.protobuf.Timestamp timestamp_end = 13; // Use this time as marker that affected objects are recovered (more likely).
    string problem_id = 9;
    ESeverity severity = 11;
    repeated ComponentRef affected_objects = 12;
    repeated SpecificObject affected_objects_spec = 8;
}

// Represents self-diagnosis attempt to solve the problem.
message DiagnosticActionEvent
{
    enum EActionType
    {
        ACTION_TYPE_UNSPECIFIED = 0;

        AT_CLEANUP_DB      = 1; // Clean up database events
        AT_CLEANUP_LOGS    = 2; // Clean up bulky data: logs, crash dumps, and etc.
        AT_KILL_PROCESS    = 3; // Kill unwanted, faulty, or resource leaking process
        AT_RESTART_SERVICE = 4; // Restart NGP services that seems malfunctioning
    }
    // Action template info.
    EActionType action_type = 2;
    string action_description = 3;

    // Action info.
    google.protobuf.Timestamp timestamp = 8;
    string problem_id = 7;
    string action_error = 4; // Non-empty on error
    repeated ComponentRef affected_objects = 5;
    repeated SpecificObject affected_objects_spec = 6;
}

// This event indicates that a local configuration packet has been changed.
message ConfigChangedEvent
{
    // A name of the configuration packet.
    string name = 1;

    // A type of the service.
    string type = 4;

    // A name of the node.
    string node_name = 5;

    // A description on what's happened with the configuration packet.
    ChangeAction action = 2;
    enum ChangeAction
    {
        CHANGE_ACTION_UNSPECIFIED = 0;

        // The configuration packet has been created.
        ADDED = 1;

        // The configuration packet has been modified.
        CHANGED = 2;
        
        // The configuration packet has been removed.
        REMOVED = 3;
    }

    // The updated etag of the configuration packet.
    // Empty if the packet has been removed.
    string etag = 3;

    google.protobuf.Timestamp timestamp = 10;
}

// This event indicates that a shared configuration packet has been changed.
message SharedConfigChangedEvent
{
    // A name of the configuration packet.
    string name = 1;

    // A description on what's happened with the configuration packet.
    ChangeAction action = 2;
    enum ChangeAction
    {
        CHANGE_ACTION_UNSPECIFIED = 0;

        // The configuration packet has been created.
        ADDED = 1;

        // The configuration packet has been modified.
        CHANGED = 2;

        // The configuration packet has been removed.
        REMOVED = 3;
    }

    // The updated etag of the configuration packet.
    // Empty if the packet has been removed.
    string etag = 3;

    google.protobuf.Timestamp timestamp = 10;
}

// The status of the service (the server's app)
message ServiceStatus
{
    string service_name = 1;

    Status status = 2;
    enum Status
    {
        STATUS_UNSPECIFIED = 0;
        STARTED = 1;
        STARTING_FAILED = 2;
        STOPPED = 3;
        ABENDED = 4;
        STARTING = 5;
        STOPPING = 6;
        LICENSE_FAILED = 7;
    }

    google.protobuf.Timestamp timestamp = 3;
}

// This event indicates that some links to the current configuration packet
// have been added or removed, i.e. some other packets start or stop referring to the packet.
message ConfigLinkageChangedEvent
{
    // A name of the configuration packet.
    string name = 1;

    // A type of the service.
    string type = 2;

    // A name of the node.
    string node_name = 3;
}

message GlobalTrackProfileChangedEvent
{

}
