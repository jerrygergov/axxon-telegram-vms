        AE_LAYOUT_SETUP = 61;
        AE_USER_LOGIN_FAILED = 62;
        AE_PTZ_CONTROL = 63;
        AE_ARCHIVE_COMMENT_ADD = 64;
        AE_ARCHIVE_COMMENT_EDIT = 65;
        
        reserved 66 to 73;
        
        AE_COUNTER_ADD = 74;
        AE_COUNTER_REMOVE = 75;
        AE_COUNTER_SETUP = 76;
        AE_ALERT_POSTPONE = 77;

        AE_REVISION_RESET = 78;
        AE_BACKUP_APPLIED = 79;
        AE_ARCHIVE_REPLICATION_SETUP = 80;
        AE_TEMPLATE_BINDING = 81;
        AE_TEMPLATE_UNBINDING = 82;
