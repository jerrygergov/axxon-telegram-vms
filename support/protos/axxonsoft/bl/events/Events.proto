    }
    
    message UserInfo
    {
        string name = 1;
        string friendly_name = 2;

        string role_name = 3; // freindly_name of current role
    }

    message Parameter
    {
        string group = 1;
        string name = 2;
        string value = 3;
    }

    string guid = 1;
    string timestamp = 2;

    EAuditEventType operation = 3;

    NodeRef node_info = 4;
    UserInfo user = 5;
    string ip_address = 6;

    repeated ComponentRef components = 11; // camera, detector, telemetry and so on
    MacroRef macro = 12; // if the event affects macro

    reserved 21;

    repeated Parameter params = 22;
}

message UserLockedEvent
{
    string guid = 1;
    string timestamp = 2;
    NodeRef node_info = 3;
    string username = 4;
    string attempts_number = 5;
}

message CpuOverloadedEvent
{
    enum EOverloadingLevel
    {   // This levels correspond 80% and 90% CPU usage
        CPU_UNSPECIFIED = 0;
        CPU_MEDIUM_OVERLOAD = 1;
        CPU_CRITICAL_OVERLOAD = 2;
    }

    string guid = 1;
    string timestamp = 2;
    NodeRef node_info = 3;
    EOverloadingLevel overload_level = 4;
}

message LicenseServiceEvent
{
    enum EStatus
    {
        LS_OK = 0;
        LS_NoKey = 1;
        LS_InvalidKey = 2;
        LS_MismatchingKey = 3;
        LS_Expired = 4;
        LS_DemoActive = 5;
        LS_DemoInactive = 6;
        LS_DemoExpired = 7;
        LS_Unavailable = 8;  
    }

    message Status
    {
        EStatus status = 1;
    }

    message RestrictionsUpdated
    {
    }
    
    message ExpiresSoon
    {
    }

    message RemoteHostInfo
    {
        string address = 1;
    }
    
    oneof reporter
    {
        NodeRef local_host = 1;
        RemoteHostInfo remote_host = 2;
    }

    oneof value
    {
        Status status = 10;
        RestrictionsUpdated restrictions_updated = 11; 
        ExpiresSoon expires_soon = 12;
    }
}

message DetectorEvent //JE_Type = 0
{
    string guid = 1;
    string timestamp = 2;

    enum AlertState
    {
        // Not specified.
        HAPPENED = 0;
        BEGAN = 1;
        ENDED = 2;
        SPECIFIED = 3; // to specify HAPPEND event
    }

    // State of event, if applicable.
    AlertState state = 3;
    
    // multi-media origin of detector
    string origin_deprecated = 4;// Deprecated, use origin_ext.
    ComponentRef origin_ext = 10;
    string offline_analytics_source = 16;
    
    // Access point of detector which generates this event.
    string detector_deprecated = 5;// Deprecated, use detector_ext. 
    ComponentRef detector_ext = 11;
    NodeRef node_info = 12;
    
    // Event category type, like motion, face and so on 
    // TODO: discuss this field with E. Mironov
    string event_type = 6;

    string multi_phase_id = 8;

    repeated EDetectorsGroup detectors_group = 9;

    // License plate
    message AutoRecognitionHypotheses
    {
        int32 ocr_quality = 1;
        string plate_full = 2;
        primitive.Rectangle plate_rectangle = 3;
        string time_best = 4;
        string country = 5;
        string plate_state = 6;
    }

    // Temperature detector
    message TemperatureInfo
    {
        primitive.Temperature max = 1;
        primitive.Temperature min = 2;
        primitive.Temperature avg = 3;
    }

    // Tampering detector
    message TamperInfo
    {
        enum ETamperType
        {
            SceneChange = 0;
            QualityDegradation = 1;
            QualityDegradationV2 = 2;
            BlurredDegradation = 3;
            CompressedDegradation = 4;
        }
        repeated ETamperType tamper_types = 1;
    }

    // License plate
    message AutoRecognitionResult
    {
        enum EVehicleClass
        {
            VehicleClassUnknown = 0;
            Car = 1;
            Truck = 2;
            Bus = 3;
            Motorcycle = 4;
            LightCommercialVehicle = 5;
            Trolleybus = 6;
            Tram = 7;
            VanVehicle = 8;
            MiniVanVehicle = 9;
            SUV = 10;
            Pickup = 11;
            Average = 12;
            LargeVehicle = 13;
            MegaLarge = 14;
            SpecialTransport = 15;
            DumpTruck = 16;
            Sedan = 17;
        }

        enum EVehicleSubclass
        {
            VehicleSubclassUnknown = 0;
            CarSubclass = 1;
            CarWithTrailer = 2;
            MiniBus = 3;
            TruckUp5Tons = 4;
            SmallBiaxialBus = 5;
            TwoAxleTruck = 6;
            ThreeAxleTruck = 7;
            SpecialTechnique = 8;
            LargeBiaxialBus = 9;
            TrolleybusSubclass = 10;
            TramSubclass = 11;
            TruckBusTrailer = 12;
            LargeSpecialTechnique = 13;
            MegaLargeBus = 14;
            MegaLargeTruck = 15;
            MotorbikeMoped = 16;
            BicycleSubclass = 17;
            SpecialCar = 18;
            SpecialMinibus = 19;
            SpecialTruck = 20;
            TwoAxleDumpTruck = 21;
            ThreeAxleDumpTruck = 22;
            FourAxleDumpTruck = 23;
        }

        enum EHeadlightsStatus
        {
            Undefined = 0;
            Enabled = 1;
            Disabled = 2;
        }

        enum EDirection
        {
            Unknown = 0;
            Incoming = 1;
            Outgoing = 2;
        }

        enum EPlateType
        {
            EAgricultural = 0;
            EAmbulance = 1;
            EATV = 2;
            EBicycle = 3;
            EBusPublicTransport = 4;
            ECivilDefenseForces = 5;
            EClassicalHistorical = 6;
            EClassicalMotorcycle = 7;
            ECommercial = 8;
            EConsular = 9;
            EDealer = 10;
            EDiplomatic = 11;
            // Value '12' is missing, reason unknown.
            reserved 12;
            EDiplomaticHeadsCar = 13;
            EDiplomaticMotorcycle = 14;
            EElectricCar = 15;
            EExporting = 16;
            EFireServices = 17;
            EForeigner = 18;
            EFuneral = 19;
            EGovernmental = 20;
            EHandicapped = 21;
            EImported = 22;
            EInternationalOrganisation = 23;
            EJusticePolice = 24;
            ELeased = 25;
            ELegalEntity = 26;
            ELocalAuthority = 27;
            EMilitary = 28;
            EMilitaryMotorcycle = 29;
            EMilitaryTrailerSemitrailer = 30;
            EMilitaryWorkVehicle = 31;
            EMoped = 32;
            EPolice = 33;
            EPoliceMotorcycle = 34;
            EPoliceTrailerSemitrailer = 35;
            EPrivateMotorcycle = 36;
            EPrivateVehicle = 37;
            ERailwayServices = 38;
            ERedCross = 39;
            ERentalVehicle = 40;
            ERoyal = 41;
            EScooter = 42;
            ESlowVehicle = 43;
            ESmallVehicle = 44;
            ESnowmobileAllTerrainVehicle = 45;
            ESportsCarTruck = 46;
            ESportsMotocycle = 47;
            ETaxFree = 48;
            ETaxi = 49;
            ETechnological = 50;
            ETemporary = 51;
            ETemporaryMilitary = 52;
            ETemporaryMotorcycle = 53;
            ETemporaryWorkVehicle = 54;
            ETestDrive = 55;
            ETrailerSemitrailer = 56;
            ETransportingGoods = 57;
            ETrucks = 58;
            EUnitedNations = 59;
            EUnknownPlateType = 60;
            EVan = 61;
            EWorkVehicle = 62;
            EAirport = 63;
            EBorder = 64;
            ECivilDefenseForcesMotorcycle = 65;
            EDrivingSchool = 66;
            EExperiment = 67;
            ELimousine = 68;
        }

        EDirection direction = 1;
        string time_begin = 2;
        string time_end = 3;
        repeated AutoRecognitionHypotheses hypotheses = 8;
        EVehicleClass vehicle_class = 9;
        string vehicle_color = 10;
        string vehicle_brand = 11;
        string vehicle_model = 12;
        EHeadlightsStatus headlights_status = 13;
        double vehicle_speed = 14 [deprecated = true]; // its was unitless and replaced by vehicle_speed_kmph
        double vehicle_speed_kmph = 15;
        EPlateType plate_type = 16;
        EVehicleSubclass vehicle_subclass = 17;
    }

    message AutoRecognitionResultEx
    {
        enum EVehiclePurpose
        {
            Unknown = 0;
            FireTrucks = 1;
            Police = 2;
            Ambulance = 3;
        }

        message VehicleClass
        {
            AutoRecognitionResult.EVehicleClass value = 1;
        }
        message VehicleSubclass
        {
            AutoRecognitionResult.EVehicleSubclass value = 1;
        }
        message HeadlightsStatus
        {
            AutoRecognitionResult.EHeadlightsStatus value = 1;
        }
        message Direction
        {
            AutoRecognitionResult.EDirection value = 1;
        }
        message VehicleColor
        {
            string value = 1;
        }
        message VehicleBrand
        {
            string value = 1;
        }
        message VehicleModel
        {
            string value = 1;
        }
        message VehicleSpeed
        {
            double value = 1;
        }
        message PlateType
        {
            AutoRecognitionResult.EPlateType value = 1;
        }
        message VehiclePurpose
        {
            EVehiclePurpose value = 1;
        }

        google.protobuf.Timestamp time_begin = 1;
        google.protobuf.Timestamp time_end = 2;
        repeated AutoRecognitionHypotheses hypotheses = 3;

        //Optional values, some of LPR detectors unable to provide full list.
        Direction direction = 4;
        VehicleClass vehicle_class = 5;
        VehicleColor vehicle_color = 6;
        VehicleBrand vehicle_brand = 7;
        VehicleModel vehicle_model = 8;
        HeadlightsStatus headlights_status = 9;
        VehicleSpeed vehicle_speed = 10;
        PlateType plate_type = 11;
        VehiclePurpose vehicle_purpose = 12;

        // Number of vehicle axles.
        google.protobuf.Int32Value vehicle_axle_amount = 13;
        VehicleSubclass vehicle_subclass = 14;
    }

    message FaceRecognitionResult
    {
        enum EGender
        {
            UNKNOWN = 0;
            FEMALE = 1;
            MALE = 2;
        }

        enum EEvasionType
        {
            UNCLASSIFIED = 0;
            NO_MASK = 1;
            LOWER_MASK = 2;
            FULL_MASK = 3;
            OTHER_MASK = 4;
        }

        reserved 1;
        uint64 begin_time = 2; // TODO: replace with DateTime type
        double best_quality = 3;
       
        // Optional param. The age of the person.
        // 0 means undefined age.
        google.protobuf.Int32Value optional_age = 9;

        message Gender
        {
            EGender value = 1; 
        }
        // Optional param. The gender of the person.
        Gender optional_gender = 10;

        primitive.Temperature temperature = 6;
        EEvasionType evasion_type = 7;
        // Liveness shows whether the face looks alive or fake. true for real person, false for fake.
        google.protobuf.BoolValue liveness = 8;

        // Deprecated. Use "optional_age" instead
        // 0 if functionality turned off
        int32 age = 4 [deprecated = true];

        // Deprecated. Use "optional_gender" instead
        EGender gender = 5 [deprecated = true];
    }

    message ListedItemExtraData
    {
        string external_system_type_name = 1;
        map<string, string> additional_info = 10;
    }

    message ListedFaceDetectedInfo
    {
        double score = 1;
        string listed_face_image_id = 2;
        ListedItemExtraData extra_data = 10;
    }

    message ListedPlateDetectedInfo
    {
        string plate = 1;
        reserved 2;
        ListedItemExtraData extra_data = 10;
    }

    message ListedObjectDetectedInfo
    {
        enum EObjType
        {
            EOT_Food = 0;
        }

        EObjType type = 1;
        double score = 2;
        string listed_object_image_id = 3;
    }

    message ListedItemDetectedInfo
    {
        string list_id = 1; // Deprecated, use lists_info
        string list_name = 8; // Deprecated, use lists_info
       
        message ListInfo
        {
            string list_id = 1;
            string list_name = 2;
        }
        enum EGender
        {
            UNKNOWN = 0;
            FEMALE = 1;
            MALE = 2;
        }
        
        repeated ListInfo lists_info = 10;
        
        string listed_item_id = 2;
        string matched_event_id = 3;
        string matched_event_time = 4;

        reserved 5 to 7;

        string name = 9;
        int32 age = 11;
        EGender gender = 12;

        oneof value
        {
            ListedFaceDetectedInfo listed_face_info = 21;
            ListedPlateDetectedInfo listed_plate_info = 22;
            ListedObjectDetectedInfo listed_object_info = 23;
        }
    }

    message QueueDetectedInfo
    {
        int32 queue_min = 1;
        int32 queue_max = 2;
    }
    
    message MoveInZoneInfo
    {
        enum EObjectClass
        {
            FACE = 0;
            HUMAN = 1;
            GROUP = 2;
            VEHICLE = 3;
        }
        
        EObjectClass object_class = 1;
    }

    message ByteVector
    {
        bytes data = 1;
        int32 type = 2;
        string subtype = 3;
        int32 version = 4;
        bytes image_data = 5;
        string guid = 6;
    }

    message LotsObjectsInfo
    {
        uint32 object_count = 1;
    }

    message VLPpeDetectorInfo
    {
        string ppe_type = 1 [deprecated = true]; 
     
        enum EAbsentPpeType
        {
            EGloves = 0;
            EVest = 1;
            EHelmet = 2;
            EHood = 3;
        }
        
        EAbsentPpeType ppe_type_enum = 2;
    }

    message GlobalTrackProfile
    {
        string global_track_id = 1;
        string profile_id = 2;
        string profile_origin = 3;
    }

    message BarcodeHypotheses
    {
        int32 id = 1;
        string text = 2;
        primitive.Rectangle rectangle = 3;
        string barcode_type = 4;
    }

    message BarcodeDecodedRresult
    {
        string decoding_time = 1;
        repeated BarcodeHypotheses hypotheses = 2;
    }

    message VehicleTransitInfo
    {
        repeated string lanes_ids = 1;
    }

    message Details
    {
        oneof value 
        {
            primitive.Rectangle rectangle = 8;
            AutoRecognitionResult auto_recognition_result = 10 [deprecated = true];
            FaceRecognitionResult face_recognition_result = 11;
            ListedItemDetectedInfo listed_item_detected_result = 12;
            QueueDetectedInfo queue_detected_result = 13;
            MoveInZoneInfo move_in_zone = 14;
            ByteVector byte_vector = 15;
            primitive.GeoPosition geo_position = 16;
            LotsObjectsInfo lots_objects = 17;
            TemperatureInfo temperature = 18;
            TamperInfo tampering = 19;
            VLPpeDetectorInfo ppe_detector = 20;
            AutoRecognitionResultEx auto_recognition_result_ex = 21;
            GlobalTrackProfile global_track_profile = 22;
            BarcodeDecodedRresult barcode_decoded = 23;

            /// ID of a unique object.
            /// It should be the same for all events related to the same object.
            /// Currently the uniqueness is based on tracking information.
            /// Therefore different tracks will have different ID
            google.protobuf.Int32Value object_id = 24;
            VehicleTransitInfo transit = 25;
        }

        reserved 9;
    }
    
    repeated Details details = 7;
