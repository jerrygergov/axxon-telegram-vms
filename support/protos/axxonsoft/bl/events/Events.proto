syntax = "proto3";

package axxonsoft.bl.events;

import "axxonsoft/bl/primitive/Primitives.proto";
import "google/protobuf/any.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "bitbucket.org/Axxonsoft/bl/events";

enum EEventType
{
    EEventType_UNSPECIFIED = 0;
    ET_DetectorEvent = 1; //JE_Type = 1
    ET_StateControlStateChangeEvent = 2; //JE_Type = 3
    ET_CameraChangedEvent = 3;
    ET_CommonDeviceChangedEvent = 53;

    // Deprecated: use ObjectActivatedEvent instead
    ET_IpDeviceStateChangedEvent = 4 [deprecated = true]; //JE_Type = 0
    ET_ArchiveReplicationProgressEvent = 6;
    ET_LayoutsChangedEvent = 7;
    ET_MapsChangedEvent = 8;

    // Changes of map providers registered on the server.
    ET_MapProviderChangedEvent = 43;

    ET_MacroEvent = 9; //JE_Type = 2
    ET_StorageVolumeHealth = 10; //JE_Type = 9
    ET_StorageRecordState = 11; //JE_Type = 15
    ET_NotificationExternal = 12; //JE_Type = 4
    ET_PTZEvent = 13; // JE_Type = 5
    ET_Bookmark = 14; // JE_Type = 8
    ET_Alert = 15; // JE_Type = 6. Contains 1, 7, 9
    ET_AlertState = 16; // JE_Type = 7. Contains 14

    // Message type: CloudConfigurationChangedEvent
    ET_CloudBindingChanged = 17;

    // Message type: HostStatus
    ET_HostStatusChangedEvent = 18;
    ET_InternalHostStatus = 50;
    ET_GroupMembershipChangedEvent = 19;
    ET_ExternalMacroEvent = 20;
    ET_CameraArmStateEvent = 21; // JE_Type = 19
    ET_ObjectActivatedEvent = 22;
    ET_ControlPanelStateEvent = 23; // JE_Type = 12 (JE_Internal, type: EJEI_JoystickState)

    // Deprecated:
    // - use ConfigChangedEvent / SharedConfigChangedEvent for configuration repository changes
    // - use ServiceStatus for service status changes
    ET_SItemStatus = 24 [deprecated = true];

    ET_LoosingVmdaData = 25; // JE_Type = 13
    ET_ACFAEvent = 26;
    ET_ServiceLifeEvent = 27;
    ET_TextEvent = 28; // JE_Type = 11
    ET_HidEvent = 29; // JE_Type = 14
    ET_IntegrityEvent = 30; // JE_Type = 10
    ET_ReplicationStateEvent = 31; // JE_Type = 12 (JE_Internal, type: EJEI_ReplicationState)
    ET_ReplicationProgressEvent = 32; // JE_Type = 12 (JE_Internal, type: EJEI_ReplicationProgress)

    // Message type: AuditEvent
    ET_Audit = 33;
    ET_SensorSignalLevelChanged = 34;
    ET_TimeSyncEvent = 35;
    ET_CounterEvent = 36;
    ET_VideowallStatusEvent = 37;
    ET_VideowallControlDataEvent = 38;
    ET_VideowallChangeEvent = 39;
    ET_GlobalTrackProfileChangedEvent = 40;
    
    // Self-diagnosis action event.
    ET_DiagnosticActionEvent = 42;

    // Changes of the local configuration packet.
    ET_ConfigChangedEvent = 44;

    // Changes of the shared configuration packet.
    ET_SharedConfigChangedEvent = 80;

    ET_ServiceStatus = 81;

    // Changes of a set of links to the configuration packet.
    ET_ConfigLinkageChangedEvent = 45;

    // System error event, one of the following:
    //  - DiagnosticAlertEvent
    ET_SystemError = 46;

    ET_AcfaComponentChangedEvent = 47;
    
    ET_LicenseServiceEvent = 48; // Notification about changed information or changed status inside of license service. 
    ET_ComponentChangedEvent = 49;
    ET_RRListChangedEvent = 51;
    ET_ArchiveChangedEvent = 52; // Changes of archive storage to notify UI

    ET_UserLockedEvent = 54;

    // Message type: mmexport.ExportEvent
    ET_ExportEvent = 55;

    // Changes of the data storage settings.
    //
    // Message type: settings.DataStorageSettingsChanged.
    ET_DataStorageSettingsChanged = 60;
    // Message type: settings.ExportSettingsChanged.
    ET_ExportSettingsChanged = 61;
    // Message type: settings.BookmarkSettingsChanged.
    ET_BookmarkSettingsChanged = 62;
    // Message type: settings.GDPRSettingsChanged.
    ET_GDPRSettingsChanged = 63;

    // Crossing the time zone boundary.
    //
    // Message type: tz.TimeZoneEvent
    ET_TimeZoneEvent = 70;

    ET_CpuOverloadedEvent = 71;

    // Notification about macro configuration changes
    //
    // Message type: logic.MacroConfigEvent
    ET_MacroConfigEvent = 72;

    // Notification about counter configuration changes
    //
    // Message type: logic.CounterConfigEvent
    ET_CounterConfigEvent = 73;
    ET_BookmarkChangedEvent = 74;

    // LDAP
    ET_LDAPSynchronizationStateChangedEvent = 75;

    // Notification about arpagent connection state changes
    ET_ArpAgentStateChangedEvent = 76;
    
    reserved 5;
}

enum EDetectorsGroup
{
    DG_UNSPECIFIED = 0;
    DG_MOTION_DETECTOR = 1;
    DG_TRACKER = 2;
    DG_FACE_DETECTOR = 3;
    DG_SITUATION_DETECTOR = 4;
    DG_LPR_DETECTOR = 5;
    DG_AUDIO_DETECTOR = 6;
    DG_FIRE_DETECTOR = 7;
    DG_VIDEO_QUALITY_DETECTOR = 8;
    DG_COUNTER = 9;
    DG_SCENE_CHANGE_DETECTOR = 10;
    DG_TEMPERATURE_DETECTOR = 11;
    DG_GEO_POSITION = 12;
    DG_MASK = 13;
    DG_AI_DETECTOR = 14;
    DG_SEGMENTATION = 15;
    DG_FEATURE_EXTRACTOR = 16;
    DG_POSE_ESTIMATION = 17;
    DG_FACE_EVASION_DETECTOR = 18;
    DG_PRIVACY_DETECTOR = 19;
    DG_VEHICLE_DETECTOR = 20;

    DG_NO_DETECTOR = 1000;
}

enum EAlertPriority
{
    ALERT_PRIORITY_UNSPECIFIED = 0;
    AP_MINIMUM = 1;
    AP_LOW = 2;
    AP_MEDIUM = 3;
    AP_HIGH = 4;
    AP_MAXIMUM = 5;
}

message ComponentRef
{
    string access_point = 1;
    string friendly_name = 2;
    string group = 3;
}

message NodeRef
{
    string name = 1;
    string friendly_name = 2;
}

message MacroRef
{
    string guid = 1;
    string friendly_name = 2;
}

message CounterRef
{
    string guid = 1;
    string friendly_name = 2;
}

message TriggerRef
{
    string event = 1;
    ComponentRef source = 2;
    ComponentRef camera = 3;
}

