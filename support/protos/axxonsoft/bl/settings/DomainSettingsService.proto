syntax = "proto3";
package axxonsoft.bl.settings;

import "axxonsoft/bl/settings/DataStorageSettings.proto";
import "axxonsoft/bl/settings/ExportSettings.proto";
import "axxonsoft/bl/settings/BookmarkSettings.proto";
import "axxonsoft/bl/settings/GDPRSettings.proto";

import "google/protobuf/field_mask.proto";

option go_package = "bitbucket.org/Axxonsoft/bl/settings";

// Service for configuring domain-wide settings.
service DomainSettingsService
{
    // Gets the data storage settings.
    rpc GetDataStorageSettings(GetDataStorageSettingsRequest) returns (DataStorageSettings);

    // Updates the data storage settings.
    // Emits a DataStorageSettingsChanged event.
    rpc UpdateDataStorageSettings(UpdateDataStorageSettingsRequest) returns (DataStorageSettings);

    // Gets the export settings.
    rpc GetExportSettings(GetExportSettingsRequest) returns (GetExportSettingsResponse);

    // Updates the export settings.
    // Emits a ExportSettingsChanged event.
    rpc UpdateExportSettings(UpdateExportSettingsRequest) returns (UpdateExportSettingsResponse);

    // Get General Data Protection Regulation (GDPR) settings.
    rpc GetGDPRSettings(GetGDPRSettingsRequest) returns (GetGDPRSettingsResponse);

    // Update General Data Protection Regulation (GDPR) settings.
    // Emits a GDPRSettingsChanged event.
    rpc UpdateGDPRSettings(UpdateGDPRSettingsRequest) returns (UpdateGDPRSettingsResponse);

    // Gets the bookmark settings.
    rpc GetBookmarkSettings(GetBookmarkSettingsRequest) returns (GetBookmarkSettingsResponse);

    // Updates the bookmark settings.
    // Emits a BookmarkSettingsChanged event.
    rpc UpdateBookmarkSettings(UpdateBookmarkSettingsRequest) returns (UpdateBookmarkSettingsResponse);
}

// The parameters to `GetSettings`.
message GetDataStorageSettingsRequest
{
}

// The parameters to `UpdateSettings`.
message UpdateDataStorageSettingsRequest
{
    // Storage settings to update.
    DataStorageSettings data_storage_settings = 1;

    // List of fields to be updated.
    google.protobuf.FieldMask update_mask = 2;
}

// The request to get export settings.
message GetExportSettingsRequest
{
    // List of fields to return
    google.protobuf.FieldMask mask = 1;
}

// Get export settings response.
message GetExportSettingsResponse
{
    // Export settings
    ExportSettings settings = 1;

    // config tag
    string etag = 2;
}

message GetGDPRSettingsRequest
{
    // List of fields to return.
    // Empty list or single '*' means all fields
    google.protobuf.FieldMask mask = 1;
}

// Get General Data Protection Regulation (GDPR) settings response.
message GetGDPRSettingsResponse
{
    GDPRSettings settings = 1;

    // config tag.
    string etag = 2;
}

// The request to get bookmark settings.
message GetBookmarkSettingsRequest
{
    // List of fields to return
    google.protobuf.FieldMask mask = 1;
}

// Get bookmark settings response.
message GetBookmarkSettingsResponse
{
    // Bookmark settings
    BookmarkSettings settings = 1;

    // config tag
    string etag = 2;
}

// The request to update export settings.
message UpdateExportSettingsRequest
{
    // Export settings
    ExportSettings settings = 1;

    // List of fields to be updated
    google.protobuf.FieldMask mask = 2;

    // config tag
    string etag = 3;
}

// Update export settings response.
message UpdateExportSettingsResponse
{
    // config tag
    string etag = 1;
}

// The request to update General Data Protection Regulation (GDPR) settings.
message UpdateGDPRSettingsRequest
{
    GDPRSettings settings = 1;

    // List of fields to be updated
    // Empty list or single '*' means all fields
    google.protobuf.FieldMask mask = 2;

    // config tag
    string etag = 3;
}

// Update General Data Protection Regulation (GDPR) settings response.
message UpdateGDPRSettingsResponse
{
    // config tag
    string etag = 1;
}

// The request to update bookmark settings.
message UpdateBookmarkSettingsRequest
{
    // Bookmark settings
    BookmarkSettings settings = 1;

    // List of fields to be updated
    google.protobuf.FieldMask mask = 2;

    // config tag
    string etag = 3;
}

// Update bookmark settings response.
message UpdateBookmarkSettingsResponse
{
    // config tag
    string etag = 1;
}
