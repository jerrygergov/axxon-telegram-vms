syntax = "proto3";
package axxonsoft.bl.archive;

option go_package = "bitbucket.org/Axxonsoft/bl/archive";

message BundleBackupRequest
{
    // replication storage sources
    repeated string access_points = 1;
    // replication timeline
    repeated BackupTimeInterval intervals = 2;
    // status response interval (seconds)
    uint32 report_timeout_sec = 3;
}

message BundleBackupResponse
{
    enum EStatus
    {
        BUSY = 0;
        DONE = 1;
    }

    // the average interval (milliseconds) to the end
    uint64 remainder_ms = 1;
    // status of the replication
    EStatus status = 2;
}

message IsBackupInProgressRequest
{
    string access_point = 1;
}

message BackupTimeInterval
{
    uint64 beginTime = 1;
    uint64 endTime = 2;
}

message IsBackupInProgressResponse
{
    bool in_progress = 1;
}

message MakeBackupRequest
{
    string access_point = 1;
    repeated BackupTimeInterval intervals = 2;
}

message MakeBackupResponse
{
    string task_id = 1;
    string worker_id = 2;
}

message CancelBackupResponse
{
}

message CancelBackupRequest
{
    string access_point = 1;
    string task_id = 2;
}

message GetRestProgressRequest
{
    string access_point = 1;
    uint64 time = 2;
}

message GetRestProgressResponse
{
    uint64 remaining_duration = 1;
    string worker_id = 2;
}

service BackupSourceService
{
    rpc BundleBackup(BundleBackupRequest) returns (stream BundleBackupResponse);
    rpc MakeBackup(MakeBackupRequest) returns (MakeBackupResponse);
    rpc CancelBackup(CancelBackupRequest) returns (CancelBackupResponse);
    rpc IsBackupInProgress(IsBackupInProgressRequest) returns (IsBackupInProgressResponse);
    rpc GetRestProgress(GetRestProgressRequest) returns (GetRestProgressResponse);
}
