syntax = "proto3";
package axxonsoft.bl.state;

option go_package = "bitbucket.org/Axxonsoft/bl/state";

message GetDefaultStateRequest
{
	string access_point = 1;
}

message GetDefaultStateResponse
{
	bool result = 1;
}
message GetCurrentStateRequest
{
	string access_point = 1;
}

message GetCurrentStateResponse
{
	bool result = 1;
}


message SetStateResponse
{
	bool result = 1;
}

enum EStateDirective
{
	STATE_DIRECTIVE_NEUTRAL = 0;
	STATE_DIRECTIVE_OFF = 1;
	STATE_DIRECTIVE_ON = 2;
}

enum EPriority
{
    PRIORITY_DEFAULT_STATE = 0;
    PRIORITY_DAEMON = 1;
    PRIORITY_USER = 2;
}


message SetStateRequest
{
	string access_point = 1;
	EPriority priority = 3;
	EStateDirective directive = 4;
}

service StateControlService
{
	rpc SetState(SetStateRequest) returns (SetStateResponse);
	rpc GetDefaultState(GetDefaultStateRequest) returns (GetDefaultStateResponse);
	rpc GetCurrentState(GetCurrentStateRequest) returns (GetCurrentStateResponse);
}
